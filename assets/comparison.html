<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, initial-scale=1.0" />
    <title>Same page. Different syntax.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,800;0,9..40,900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Brand palette (from twitter cards) */
        --navy: #1a2b3c;
        --teal: #2d8a9c;
        --teal-dark: #1d6e7e;
        --mint: #4db8a4;
        --coral: #e8785a;
        --coral-deep: #d4604a;

        /* Window chrome */
        --win-bg: #1e1e2e;
        --win-bar: #2a2a3e;
        --win-border: rgba(255, 255, 255, 0.08);
        --win-shadow: 0 25px 80px rgba(0, 0, 0, 0.45), 0 8px 24px rgba(0, 0, 0, 0.3);

        /* Traffic lights */
        --dot-red: #ff5f57;
        --dot-yellow: #febc2e;
        --dot-green: #28c840;

        /* JSON syntax (muted reds — this is the "bad" side) */
        --j-key: #89b4fa;
        --j-string: #f38ba8;
        --j-bool: #fab387;
        --j-punct: #45475a;
        --j-text: #a6adc8;

        /* Markdown syntax (warm greens/teals — this is the "good" side) */
        --m-heading: #89dceb;
        --m-bold: #f9e2af;
        --m-bullet: #cba6f7;
        --m-callout: #a6e3a1;
        --m-text: #cdd6f4;
        --m-dim: #6c7086;

        /* Page bg */
        --page-bg: #11111b;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html {
        display: flex;
        justify-content: center;
        min-height: 100vh;
        background: var(--page-bg);
      }

      body {
        width: 1080px;
        min-height: 100vh;
        background: var(--page-bg);
        font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
        color: #cdd6f4;
        position: relative;
      }

      /* ── Background gradient ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 700px 600px at 10% 20%, rgba(99, 102, 241, 0.12), transparent),
          radial-gradient(ellipse 600px 500px at 90% 15%, rgba(232, 120, 90, 0.10), transparent),
          radial-gradient(ellipse 800px 600px at 50% 70%, rgba(45, 138, 156, 0.10), transparent),
          radial-gradient(ellipse 500px 400px at 70% 90%, rgba(168, 85, 247, 0.06), transparent);
        pointer-events: none;
        z-index: 0;
      }

      /* ── Subtle noise ── */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
        background-size: 200px 200px;
        pointer-events: none;
        z-index: 100;
      }

      .container {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        padding: 56px 44px 48px;
      }

      /* ── Header ── */
      .header {
        text-align: center;
        margin-bottom: 44px;
        opacity: 0;
        animation: fadeUp 0.7s ease-out 0.15s forwards;
      }

      .overline {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--teal);
        margin-bottom: 14px;
      }

      h1 {
        font-size: 54px;
        font-weight: 900;
        letter-spacing: -0.04em;
        line-height: 1.08;
        color: #ffffff;
      }

      h1 .accent {
        background: linear-gradient(135deg, var(--teal) 20%, var(--mint) 80%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .versus {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-top: 22px;
        font-size: 16px;
        font-weight: 700;
      }

      .versus .left { color: rgba(243, 139, 168, 0.8); }
      .versus .right { color: var(--mint); }
      .versus .vs-dot {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--win-bar);
        border: 1px solid var(--win-border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 800;
        color: #6c7086;
        letter-spacing: 0.04em;
      }

      /* ── Panel wrapper ── */
      .panels {
        display: flex;
        gap: 20px;
        opacity: 0;
        animation: fadeUp 0.7s ease-out 0.4s forwards;
      }

      /* ── macOS-style window ── */
      .mac-window {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-radius: 12px;
        overflow: hidden;
        background: var(--win-bg);
        border: 1px solid var(--win-border);
        box-shadow: var(--win-shadow);
        position: relative;
      }

      /* Title bar */
      .title-bar {
        display: flex;
        align-items: center;
        height: 44px;
        padding: 0 16px;
        background: var(--win-bar);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        flex-shrink: 0;
      }

      .dots {
        display: flex;
        gap: 8px;
        margin-right: 14px;
      }

      .dots span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      .dots .d-r { background: var(--dot-red); }
      .dots .d-y { background: var(--dot-yellow); }
      .dots .d-g { background: var(--dot-green); }

      .title-bar .filename {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 500;
        color: #6c7086;
        flex: 1;
        text-align: center;
        margin-right: 52px; /* offset for dots width to truly center */
      }

      /* Token count — big and unmissable */
      .token-count {
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        background: rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      .token-count .number {
        font-family: "JetBrains Mono", monospace;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .token-count .unit {
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        font-weight: 600;
        opacity: 0.5;
      }

      .mac-window.json-win .token-count .number {
        color: var(--coral);
      }

      .mac-window.md-win .token-count .number {
        color: var(--mint);
      }

      /* Code area */
      .code-body {
        position: relative;
        padding: 18px 0;
      }

      /* Glow accent on easy panel */
      .mac-window.md-win {
        box-shadow:
          var(--win-shadow),
          0 0 60px -15px rgba(77, 184, 164, 0.15);
      }

      .mac-window.md-win::after {
        content: "";
        position: absolute;
        top: -1px;
        left: 20%;
        right: 20%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--mint), transparent);
        opacity: 0.5;
        border-radius: 0 0 2px 2px;
        z-index: 5;
      }

      pre {
        margin: 0;
        padding: 0 20px;
        width: 100%;
      }

      code {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        line-height: 1.7;
        display: block;
        white-space: pre;
      }

      /* Line numbers */
      .ln {
        display: inline-block;
        width: 28px;
        text-align: right;
        margin-right: 16px;
        color: #313244;
        user-select: none;
        font-size: 11.5px;
      }

      .mac-window.md-win .ln { color: #1e3a2e; }

      /* ── Syntax classes ── */
      .jk { color: var(--j-key); }
      .js { color: var(--j-string); }
      .jb { color: var(--j-bool); }
      .jp { color: var(--j-punct); }

      .mh { color: var(--m-heading); font-weight: 700; }
      .mb { color: var(--m-bold); font-weight: 700; }
      .mbr { color: var(--m-dim); }
      .mbu { color: var(--m-bullet); font-weight: 600; }
      .mc { color: var(--m-callout); }
      .mt { color: var(--m-text); }
      .mq { color: var(--m-callout); opacity: 0.4; }

      /* Cursor */
      .cursor {
        display: inline-block;
        width: 2px;
        height: 16px;
        background: var(--mint);
        margin-left: 2px;
        vertical-align: text-bottom;
        animation: blink 1s step-end infinite;
      }

      /* ── Stats strip ── */
      .stats {
        display: flex;
        gap: 14px;
        margin-top: 36px;
        opacity: 0;
        animation: fadeUp 0.7s ease-out 0.7s forwards;
      }

      .stat-card {
        flex: 1;
        padding: 24px 16px;
        text-align: center;
        border-radius: 12px;
        background: var(--win-bg);
        border: 1px solid var(--win-border);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      }

      .stat-label {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #585b70;
        margin-bottom: 12px;
      }

      .stat-row {
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 10px;
      }

      .stat-old {
        font-family: "JetBrains Mono", monospace;
        font-size: 26px;
        font-weight: 700;
        color: var(--coral);
        opacity: 0.75;
        text-decoration: line-through;
        text-decoration-thickness: 2px;
        text-decoration-color: var(--coral-deep);
      }

      .stat-arrow {
        font-size: 18px;
        color: #585b70;
      }

      .stat-new {
        font-family: "JetBrains Mono", monospace;
        font-size: 34px;
        font-weight: 700;
        color: var(--mint);
      }

      .stat-sub {
        margin-top: 6px;
        font-size: 12px;
        color: #585b70;
        font-weight: 600;
      }

      /* ── Footer ── */
      .footer {
        text-align: center;
        margin-top: 32px;
        opacity: 0;
        animation: fadeUp 0.5s ease-out 1s forwards;
      }

      .footer .brand {
        font-family: "JetBrains Mono", monospace;
        font-size: 17px;
        font-weight: 700;
        color: var(--mint);
        letter-spacing: -0.02em;
      }

      .footer .tagline {
        font-size: 14px;
        color: #585b70;
        margin-top: 4px;
        font-weight: 500;
      }

      /* ── Animations ── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="overline">creating the same notion page</div>
        <h1>Same page.<br>Different <span class="accent">syntax.</span></h1>
        <div class="versus">
          <span class="left">notion-mcp-server</span>
          <span class="vs-dot">vs</span>
          <span class="right">easy-notion-mcp</span>
        </div>
      </header>

      <section class="panels">
        <!-- Official: macOS window with JSON -->
        <div class="mac-window json-win">
          <div class="title-bar">
            <div class="dots"><span class="d-r"></span><span class="d-y"></span><span class="d-g"></span></div>
            <span class="filename">create_page.json</span>
          </div>
          <div class="token-count">
            <span class="number">~450</span>
            <span class="unit">tokens</span>
          </div>
          <div class="code-body">
            <pre><code id="json-code"></code></pre>
          </div>
        </div>

        <!-- Easy: macOS window with markdown -->
        <div class="mac-window md-win">
          <div class="title-bar">
            <div class="dots"><span class="d-r"></span><span class="d-y"></span><span class="d-g"></span></div>
            <span class="filename">create_page</span>
          </div>
          <div class="token-count">
            <span class="number">~40</span>
            <span class="unit">tokens</span>
          </div>
          <div class="code-body">
            <pre><code id="md-code"></code></pre>
          </div>
        </div>
      </section>

      <section class="stats">
        <div class="stat-card">
          <div class="stat-label">Lines</div>
          <div class="stat-row">
            <span class="stat-old" data-count="67">0</span>
            <span class="stat-arrow">&rarr;</span>
            <span class="stat-new" data-count="11">0</span>
          </div>
          <div class="stat-sub">84% fewer</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Tokens</div>
          <div class="stat-row">
            <span class="stat-old" data-count="450">0</span>
            <span class="stat-arrow">&rarr;</span>
            <span class="stat-new" data-count="40">0</span>
          </div>
          <div class="stat-sub">91% cheaper</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Block types</div>
          <div class="stat-row">
            <span class="stat-old" data-count="2">0</span>
            <span class="stat-arrow">&rarr;</span>
            <span class="stat-new" data-count="15">0</span>
          </div>
          <div class="stat-sub">in spec</div>
        </div>
      </section>

      <footer class="footer">
        <div class="brand">easy-notion-mcp</div>
        <div class="tagline">Agents write markdown. Not JSON.</div>
      </footer>
    </div>

    <script>
      function esc(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
      function w(cls, text) {
        return '<span class="' + cls + '">' + esc(text) + "</span>";
      }

      /* Single-pass JSON tokenizer */
      function highlightJSON(src) {
        var lines = src.split("\n"), out = [];
        for (var li = 0; li < lines.length; li++) {
          var ln = '<span class="ln">' + (li + 1) + "</span>";
          var text = lines[li], html = "", idx = 0;
          while (idx < text.length) {
            var ch = text[idx];
            if (ch === " " || ch === "\t") { html += ch; idx++; continue; }
            if (ch === '"') {
              var str = '"'; idx++;
              while (idx < text.length) {
                var c = text[idx]; str += c; idx++;
                if (c === "\\" && idx < text.length) { str += text[idx]; idx++; continue; }
                if (c === '"') break;
              }
              var peek = idx;
              while (peek < text.length && text[peek] === " ") peek++;
              html += w(text[peek] === ":" ? "jk" : "js", str);
              continue;
            }
            if ("{[}]:,".indexOf(ch) !== -1) { html += w("jp", ch); idx++; continue; }
            if (text.substr(idx, 4) === "true") { html += w("jb", "true"); idx += 4; continue; }
            if (text.substr(idx, 5) === "false") { html += w("jb", "false"); idx += 5; continue; }
            if ((ch >= "0" && ch <= "9") || ch === "-") {
              var num = "";
              while (idx < text.length && /[0-9eE+.\-]/.test(text[idx])) { num += text[idx]; idx++; }
              html += w("jb", num); continue;
            }
            html += esc(ch); idx++;
          }
          out.push(ln + html);
        }
        return out.join("\n");
      }

      /* Markdown highlighter */
      function highlightMD(src) {
        var lines = src.split("\n"), out = [];
        for (var i = 0; i < lines.length; i++) {
          var ln = '<span class="ln">' + (i + 1) + "</span>";
          var line = lines[i], h = "";
          if (/^##\s/.test(line)) h = w("mh", line);
          else if (/^>\s\[!/.test(line)) h = w("mq", "> ") + w("mc", line.slice(2));
          else if (/^>\s/.test(line)) h = w("mq", "> ") + w("mc", line.slice(2));
          else if (/^- /.test(line)) h = w("mbu", "- ") + w("mt", line.slice(2));
          else if (line === "") h = "";
          else {
            h = esc(line).replace(
              /\*\*(.+?)\*\*/g,
              '<span class="mbr">**</span><span class="mb">$1</span><span class="mbr">**</span>'
            );
            h = '<span class="mt">' + h + "</span>";
          }
          out.push(ln + h);
        }
        return out.join("\n");
      }

      /* Animated counters */
      function animateCounters() {
        document.querySelectorAll("[data-count]").forEach(function (el) {
          var target = parseInt(el.getAttribute("data-count"), 10);
          var start = performance.now();
          (function tick(now) {
            var p = Math.min((now - start) / 1200, 1);
            var eased = 1 - Math.pow(1 - p, 3);
            el.textContent = Math.round(target * eased);
            if (p < 1) requestAnimationFrame(tick);
          })(performance.now());
        });
      }

      /* Source data */
      var jsonSource = [
        '{',
        '  "parent": { "page_id": "abc123" },',
        '  "properties": {',
        '    "title": [{',
        '      "text": { "content": "Project Update" }',
        '    }]',
        '  },',
        '  "children": [',
        '    {',
        '      "type": "heading_2",',
        '      "heading_2": {',
        '        "rich_text": [{',
        '          "type": "text",',
        '          "text": {',
        '            "content": "Status"',
        '          }',
        '        }]',
        '      }',
        '    },',
        '    {',
        '      "type": "paragraph",',
        '      "paragraph": {',
        '        "rich_text": [',
        '          {',
        '            "type": "text",',
        '            "text": {',
        '              "content": "The project is "',
        '            }',
        '          },',
        '          {',
        '            "type": "text",',
        '            "text": {',
        '              "content": "on track"',
        '            },',
        '            "annotations": {',
        '              "bold": true',
        '            }',
        '          },',
        '          {',
        '            "type": "text",',
        '            "text": {',
        '              "content": " for launch."',
        '            }',
        '          }',
        '        ]',
        '      }',
        '    },',
        '    {',
        '      "type": "bulleted_list_item",',
        '      "bulleted_list_item": {',
        '        "rich_text": [{',
        '          "type": "text",',
        '          "text": {',
        '            "content": "Backend API complete"',
        '          }',
        '        }]',
        '      }',
        '    },',
        '    {',
        '      "type": "bulleted_list_item",',
        '      "bulleted_list_item": {',
        '        "rich_text": [{',
        '          "type": "text",',
        '          "text": {',
        '            "content": "Frontend in review"',
        '          }',
        '        }]',
        '      }',
        '    },',
        '    {',
        '      "type": "bulleted_list_item",',
        '      "bulleted_list_item": {',
        '        "rich_text": [{',
        '          "type": "text",',
        '          "text": {',
        '            "content": "Tests passing"',
        '          }',
        '        }]',
        '      }',
        '    },',
        '    {',
        '      "type": "callout",',
        '      "callout": {',
        '        "rich_text": [{',
        '          "type": "text",',
        '          "text": {',
        '            "content": "Ship date: Friday"',
        '          }',
        '        }],',
        '        "icon": {',
        '          "type": "emoji",',
        '          "emoji": "\uD83D\uDE80"',
        '        }',
        '      }',
        '    }',
        '  ]',
        '}'
      ].join("\n");

      var mdSource = [
        '## Status',
        '',
        'The project is **on track** for launch.',
        '',
        '- Backend API complete',
        '- Frontend in review',
        '- Tests passing',
        '',
        '> [!NOTE]',
        '> Ship date: Friday'
      ].join("\n");

      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("json-code").innerHTML = highlightJSON(jsonSource);
        document.getElementById("md-code").innerHTML =
          highlightMD(mdSource) + '<span class="cursor"></span>';
        setTimeout(animateCounters, 1400);
      });
    </script>
  </body>
</html>
