<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, initial-scale=1.0" />
    <title>B-Roll: The JSON Wall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,700;9..40,900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --win-bg: #1e1e2e;
        --win-bar: #2a2a3e;
        --win-border: rgba(255, 255, 255, 0.08);
        --dot-red: #ff5f57;
        --dot-yellow: #febc2e;
        --dot-green: #28c840;
        --j-key: #89b4fa;
        --j-string: #f38ba8;
        --j-bool: #fab387;
        --j-punct: #45475a;
        --page-bg: #11111b;
        --coral: #e8785a;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html {
        display: flex;
        justify-content: center;
        min-height: 100vh;
        background: var(--page-bg);
      }

      body {
        width: 1080px;
        background: var(--page-bg);
        font-family: "DM Sans", sans-serif;
        color: #cdd6f4;
        position: relative;
      }

      /* Background gradient */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 700px 600px at 10% 20%, rgba(99, 102, 241, 0.12), transparent),
          radial-gradient(ellipse 600px 500px at 90% 15%, rgba(232, 120, 90, 0.10), transparent),
          radial-gradient(ellipse 800px 600px at 50% 70%, rgba(45, 138, 156, 0.10), transparent);
        pointer-events: none;
        z-index: 0;
      }

      /* Noise */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
        background-size: 200px 200px;
        pointer-events: none;
        z-index: 100;
      }

      .container {
        position: relative;
        z-index: 1;
        padding: 56px 44px 80px;
      }

      /* Header */
      .header {
        text-align: center;
        margin-bottom: 32px;
      }

      .header h1 {
        font-size: 42px;
        font-weight: 900;
        letter-spacing: -0.04em;
        color: #fff;
        line-height: 1.1;
      }

      .header .sub {
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        color: var(--coral);
        margin-top: 10px;
        font-weight: 600;
      }

      /* macOS window — full width, tall */
      .mac-window {
        border-radius: 12px;
        overflow: hidden;
        background: var(--win-bg);
        border: 1px solid var(--win-border);
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.45), 0 8px 24px rgba(0, 0, 0, 0.3);
      }

      .title-bar {
        display: flex;
        align-items: center;
        height: 44px;
        padding: 0 16px;
        background: var(--win-bar);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .dots {
        display: flex;
        gap: 8px;
        margin-right: 14px;
      }

      .dots span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      .d-r { background: var(--dot-red); }
      .d-y { background: var(--dot-yellow); }
      .d-g { background: var(--dot-green); }

      .title-bar .filename {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 500;
        color: #6c7086;
        flex: 1;
        text-align: center;
        margin-right: 52px;
      }

      .token-count {
        padding: 14px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        background: rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      .token-count .number {
        font-family: "JetBrains Mono", monospace;
        font-size: 36px;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: var(--coral);
      }

      .token-count .unit {
        font-family: "JetBrains Mono", monospace;
        font-size: 15px;
        font-weight: 600;
        opacity: 0.5;
      }

      pre {
        margin: 0;
        padding: 22px 24px 40px;
      }

      code {
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        line-height: 1.75;
        display: block;
        white-space: pre;
      }

      .ln {
        display: inline-block;
        width: 36px;
        text-align: right;
        margin-right: 20px;
        color: #313244;
        user-select: none;
        font-size: 12px;
      }

      .jk { color: var(--j-key); }
      .js { color: var(--j-string); }
      .jb { color: var(--j-bool); }
      .jp { color: var(--j-punct); }

      /* Auto-scroll animation for recording */
      .auto-scroll {
        animation: scrollDown 30s linear 2s forwards;
      }

      @keyframes scrollDown {
        from { transform: translateY(0); }
        to { transform: translateY(-100%); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>What agents have to write<br>with the official Notion MCP</h1>
        <div class="sub">just to create one page with a heading, list, and callout</div>
      </header>

      <div class="mac-window">
        <div class="title-bar">
          <div class="dots"><span class="d-r"></span><span class="d-y"></span><span class="d-g"></span></div>
          <span class="filename">notion-mcp-server / create_page</span>
        </div>
        <div class="token-count">
          <span class="number">~450</span>
          <span class="unit">tokens to create a simple page</span>
        </div>
        <pre><code id="json-code"></code></pre>
      </div>
    </div>

    <script>
      function esc(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
      function w(cls, text) {
        return '<span class="' + cls + '">' + esc(text) + "</span>";
      }

      function highlightJSON(src) {
        var lines = src.split("\n"), out = [];
        for (var li = 0; li < lines.length; li++) {
          var ln = '<span class="ln">' + (li + 1) + "</span>";
          var text = lines[li], html = "", idx = 0;
          while (idx < text.length) {
            var ch = text[idx];
            if (ch === " " || ch === "\t") { html += ch; idx++; continue; }
            if (ch === '"') {
              var str = '"'; idx++;
              while (idx < text.length) {
                var c = text[idx]; str += c; idx++;
                if (c === "\\" && idx < text.length) { str += text[idx]; idx++; continue; }
                if (c === '"') break;
              }
              var peek = idx;
              while (peek < text.length && text[peek] === " ") peek++;
              html += w(text[peek] === ":" ? "jk" : "js", str);
              continue;
            }
            if ("{[}]:,".indexOf(ch) !== -1) { html += w("jp", ch); idx++; continue; }
            if (text.substr(idx, 4) === "true") { html += w("jb", "true"); idx += 4; continue; }
            if (text.substr(idx, 5) === "false") { html += w("jb", "false"); idx += 5; continue; }
            if ((ch >= "0" && ch <= "9") || ch === "-") {
              var num = "";
              while (idx < text.length && /[0-9eE+.\-]/.test(text[idx])) { num += text[idx]; idx++; }
              html += w("jb", num); continue;
            }
            html += esc(ch); idx++;
          }
          out.push(ln + html);
        }
        return out.join("\n");
      }

        '    {',

        '      "callout": {',

        '          {',

        '              "content": "Ship date: Friday",',

        '            },',
        '            "annotations": {',

        '        ],',
        '        "icon": {',

        '        },',
        '        "color": "blue_background"',
        '      }',
        '    }',
        '  ]',
        '}'
      ].join("\n");

      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("json-code").innerHTML = highlightJSON(jsonSource);
      });
    </script>
  </body>
</html>
