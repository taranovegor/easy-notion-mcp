<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, initial-scale=1.0" />
    <title>Stop paying LLMs to write Notion JSON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800;9..40,900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --win-bg: #1e1e2e;
        --win-bar: #2a2a3e;
        --win-border: rgba(255, 255, 255, 0.08);
        --dot-red: #ff5f57;
        --dot-yellow: #febc2e;
        --dot-green: #28c840;
        --j-key: #89b4fa;
        --j-string: #f38ba8;
        --j-bool: #fab387;
        --j-punct: #45475a;
        --m-heading: #89dceb;
        --m-bold: #f9e2af;
        --m-bullet: #cba6f7;
        --m-callout: #a6e3a1;
        --m-text: #cdd6f4;
        --m-dim: #6c7086;
        --coral: #e8785a;
        --coral-deep: #d4604a;
        --mint: #4db8a4;
        --teal: #2d8a9c;
        --page-bg: #0c0c14;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html {
        display: flex;
        justify-content: center;
        min-height: 100vh;
        background: var(--page-bg);
      }

      body {
        width: 1080px;
        min-height: 1920px;
        background: var(--page-bg);
        font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
        color: #cdd6f4;
        position: relative;
        overflow: hidden;
      }

      /* ── JSON wall — the entire background ── */
      .json-wall {
        position: absolute;
        inset: 0;
        padding: 20px 28px;
        overflow: hidden;
        opacity: 0.28;
        z-index: 0;
      }

      .json-wall code {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        line-height: 1.65;
        display: block;
        white-space: pre;
        color: #585b70;
      }

      .json-wall .jk { color: rgba(137, 180, 250, 0.5); }
      .json-wall .js { color: rgba(243, 139, 168, 0.4); }
      .json-wall .jb { color: rgba(250, 179, 135, 0.4); }
      .json-wall .jp { color: rgba(69, 71, 90, 0.6); }

      /* Vignette over the JSON wall */
      .vignette {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 120% 80% at 50% 45%, transparent 30%, var(--page-bg) 75%);
        z-index: 1;
        pointer-events: none;
      }

      /* Extra darkening at edges */
      .vignette::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(to bottom, var(--page-bg), transparent 15%, transparent 85%, var(--page-bg));
        pointer-events: none;
      }

      /* ── Gradient color wash ── */
      .color-wash {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background:
          radial-gradient(ellipse 500px 400px at 20% 15%, rgba(232, 120, 90, 0.10), transparent),
          radial-gradient(ellipse 400px 350px at 80% 80%, rgba(99, 102, 241, 0.08), transparent);
      }

      /* ── Content layer ── */
      .content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 1920px;
        padding: 80px 44px 60px;
      }

      /* ── Headline ── */
      .headline {
        text-align: center;
        margin-bottom: 48px;
        opacity: 0;
        animation: fadeUp 0.7s ease-out 0.15s forwards;
      }

      .headline h1 {
        font-size: 52px;
        font-weight: 900;
        letter-spacing: -0.04em;
        line-height: 1.1;
        color: #ffffff;
      }

      .headline h1 .highlight {
        color: var(--coral);
      }

      .headline .sub {
        margin-top: 14px;
        font-size: 18px;
        font-weight: 600;
        color: #6c7086;
      }

      .headline .sub em {
        font-style: normal;
        color: #9ca0b0;
      }

      /* ── The red "waste" badge over the JSON wall ── */
      .waste-badge {
        display: inline-flex;
        align-items: baseline;
        gap: 10px;
        padding: 16px 32px;
        border-radius: 14px;
        background: rgba(232, 120, 90, 0.12);
        border: 1.5px solid rgba(232, 120, 90, 0.25);
        margin-bottom: 40px;
        opacity: 0;
        animation: fadeUp 0.6s ease-out 0.35s forwards;
      }

      .waste-badge .number {
        font-family: "JetBrains Mono", monospace;
        font-size: 48px;
        font-weight: 800;
        color: var(--coral);
        letter-spacing: -0.04em;
      }

      .waste-badge .label {
        font-size: 18px;
        font-weight: 700;
        color: var(--coral-deep);
        letter-spacing: 0.02em;
      }

      /* ── The floating markdown card ── */
      .md-card {
        width: 680px;
        border-radius: 16px;
        overflow: hidden;
        background: var(--win-bg);
        border: 1px solid rgba(77, 184, 164, 0.15);
        box-shadow:
          0 0 0 1px rgba(77, 184, 164, 0.08),
          0 30px 100px -10px rgba(0, 0, 0, 0.7),
          0 0 80px -20px rgba(77, 184, 164, 0.15);
        opacity: 0;
        animation: cardSlam 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        position: relative;
      }

      /* Green glow line on top */
      .md-card::before {
        content: "";
        position: absolute;
        top: -1px;
        left: 15%;
        right: 15%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--mint), transparent);
        z-index: 5;
      }

      .md-card .title-bar {
        display: flex;
        align-items: center;
        height: 44px;
        padding: 0 16px;
        background: var(--win-bar);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .dots {
        display: flex;
        gap: 8px;
        margin-right: 14px;
      }

      .dots span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      .d-r { background: var(--dot-red); }
      .d-y { background: var(--dot-yellow); }
      .d-g { background: var(--dot-green); }

      .title-bar .filename {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 500;
        color: #6c7086;
        flex: 1;
        text-align: center;
        margin-right: 52px;
      }

      /* Green token badge inside card */
      .md-card .token-row {
        padding: 14px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        background: rgba(77, 184, 164, 0.06);
        display: flex;
        align-items: baseline;
        gap: 10px;
      }

      .md-card .token-row .number {
        font-family: "JetBrains Mono", monospace;
        font-size: 40px;
        font-weight: 800;
        color: var(--mint);
        letter-spacing: -0.04em;
      }

      .md-card .token-row .label {
        font-size: 16px;
        font-weight: 700;
        color: rgba(77, 184, 164, 0.6);
      }

      .md-card pre {
        margin: 0;
        padding: 24px 28px 28px;
      }

      .md-card code {
        font-family: "JetBrains Mono", monospace;
        font-size: 15px;
        line-height: 1.75;
        display: block;
        white-space: pre;
      }

      .md-card .ln {
        display: inline-block;
        width: 24px;
        text-align: right;
        margin-right: 18px;
        color: #1e3a2e;
        user-select: none;
        font-size: 12px;
      }

      .mh { color: var(--m-heading); font-weight: 700; }
      .mb { color: var(--m-bold); font-weight: 700; }
      .mbr { color: var(--m-dim); }
      .mbu { color: var(--m-bullet); font-weight: 600; }
      .mc { color: var(--m-callout); }
      .mt { color: var(--m-text); }
      .mq { color: var(--m-callout); opacity: 0.4; }

      .cursor {
        display: inline-block;
        width: 2px;
        height: 18px;
        background: var(--mint);
        margin-left: 2px;
        vertical-align: text-bottom;
        animation: blink 1s step-end infinite;
      }

      /* ── Reduction callout below the card ── */
      .reduction {
        margin-top: 40px;
        text-align: center;
        opacity: 0;
        animation: fadeUp 0.6s ease-out 1s forwards;
      }

      .reduction .big {
        font-family: "JetBrains Mono", monospace;
        font-size: 72px;
        font-weight: 800;
        letter-spacing: -0.05em;
        color: var(--mint);
        line-height: 1;
        text-shadow: 0 0 60px rgba(77, 184, 164, 0.3);
      }

      .reduction .context {
        font-size: 22px;
        font-weight: 700;
        color: #585b70;
        margin-top: 6px;
        letter-spacing: -0.01em;
      }

      /* ── Footer brand ── */
      .footer {
        margin-top: 48px;
        text-align: center;
        opacity: 0;
        animation: fadeUp 0.5s ease-out 1.2s forwards;
      }

      .footer .brand {
        font-family: "JetBrains Mono", monospace;
        font-size: 20px;
        font-weight: 700;
        color: var(--mint);
        letter-spacing: -0.02em;
      }

      .footer .tagline {
        font-size: 15px;
        color: #45475a;
        margin-top: 4px;
        font-weight: 600;
      }

      /* ── Animations ── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes cardSlam {
        from { opacity: 0; transform: scale(0.92) translateY(30px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <!-- Layer 0: JSON wall background -->
    <div class="json-wall">
      <code id="bg-json"></code>
    </div>
    <div class="vignette"></div>
    <div class="color-wash"></div>

    <!-- Layer 2: Actual content -->
    <div class="content">
      <header class="headline">
        <h1>Stop paying LLMs<br>to write <span class="highlight">Notion JSON.</span></h1>
        <p class="sub"><em>notion-mcp-server</em> requires 67 lines of block objects per page.</p>
      </header>

      <div class="waste-badge">
        <span class="number">~450</span>
        <span class="label">tokens wasted per call</span>
      </div>

      <div class="md-card">
        <div class="title-bar">
          <div class="dots"><span class="d-r"></span><span class="d-y"></span><span class="d-g"></span></div>
          <span class="filename">easy-notion-mcp</span>
        </div>
        <div class="token-row">
          <span class="number">~40</span>
          <span class="label">tokens — same result</span>
        </div>
        <pre><code id="md-code"></code></pre>
      </div>

      <div class="reduction">
        <div class="big">91% cheaper</div>
        <div class="context">same page, same blocks, fraction of the cost</div>
      </div>

      <footer class="footer">
        <div class="brand">easy-notion-mcp</div>
        <div class="tagline">Agents write markdown. Not JSON.</div>
      </footer>
    </div>

    <script>
      function esc(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
      function w(cls, text) {
        return '<span class="' + cls + '">' + esc(text) + "</span>";
      }

      /* JSON tokenizer */
      function highlightJSON(src) {
        var lines = src.split("\n"), out = [];
        for (var li = 0; li < lines.length; li++) {
          var text = lines[li], html = "", idx = 0;
          while (idx < text.length) {
            var ch = text[idx];
            if (ch === " " || ch === "\t") { html += ch; idx++; continue; }
            if (ch === '"') {
              var str = '"'; idx++;
              while (idx < text.length) {
                var c = text[idx]; str += c; idx++;
                if (c === "\\" && idx < text.length) { str += text[idx]; idx++; continue; }
                if (c === '"') break;
              }
              var peek = idx;
              while (peek < text.length && text[peek] === " ") peek++;
              html += w(text[peek] === ":" ? "jk" : "js", str);
              continue;
            }
            if ("{[}]:,".indexOf(ch) !== -1) { html += w("jp", ch); idx++; continue; }
            if (text.substr(idx, 4) === "true") { html += w("jb", "true"); idx += 4; continue; }
            if (text.substr(idx, 5) === "false") { html += w("jb", "false"); idx += 5; continue; }
            if (text.substr(idx, 4) === "null") { html += w("jp", "null"); idx += 4; continue; }
            if ((ch >= "0" && ch <= "9") || ch === "-") {
              var num = "";
              while (idx < text.length && /[0-9eE+.\-]/.test(text[idx])) { num += text[idx]; idx++; }
              html += w("jb", num); continue;
            }
            html += esc(ch); idx++;
          }
          out.push(html);
        }
        return out.join("\n");
      }

      /* Markdown highlighter */
      function highlightMD(src) {
        var lines = src.split("\n"), out = [];
        for (var i = 0; i < lines.length; i++) {
          var ln = '<span class="ln">' + (i + 1) + "</span>";
          var line = lines[i], h = "";
          if (/^##\s/.test(line)) h = w("mh", line);
          else if (/^>\s\[!/.test(line)) h = w("mq", "> ") + w("mc", line.slice(2));
          else if (/^>\s/.test(line)) h = w("mq", "> ") + w("mc", line.slice(2));
          else if (/^- /.test(line)) h = w("mbu", "- ") + w("mt", line.slice(2));
          else if (line === "") h = "";
          else {
            h = esc(line).replace(
              /\*\*(.+?)\*\*/g,
              '<span class="mbr">**</span><span class="mb">$1</span><span class="mbr">**</span>'
            );
            h = '<span class="mt">' + h + "</span>";
          }
          out.push(ln + h);
        }
        return out.join("\n");
      }

      /* The full verbose JSON — repeats to fill the background */
      var jsonBlock = [

        '  },',
        '  "properties": {',

        '          "content": "Project Update"',
        '        }',

        '              "italic": false,',
        '              "strikethrough": false,',
        '              "underline": false,',
        '              "code": false,',
        '              "color": "default"',
        '            },',
        '            "plain_text": "The project is ",',
        '            "href": null',
        '          },',
        '          {',
        '            "type": "text",',
        '            "text": {',
        '              "content": "on track",',
        '              "link": null',
        '            },',
        '            "annotations": {',
        '              "bold": true,',
        '              "italic": false,',
        '              "strikethrough": false,',
        '              "underline": false,',
        '              "code": false,',

        '            },',
        '            "plain_text": "on track",',
        '            "href": null',
        '          },',
        '          {',
        '            "type": "text",',
        '            "text": {',
        '              "content": " for launch.",',
        '              "link": null',
        '            },',
        '            "annotations": {',
        '              "bold": false,',
        '              "italic": false,',
        '              "strikethrough": false,',
        '              "underline": false,',
        '              "code": false,',
        '              "color": "default"',
        '            },',
        '            "plain_text": " for launch.",',
        '            "href": null',
        '          }',
        '        ],',
        '        "color": "default"',
        '      }',
        '    },',
        '    {',
        '      "type": "bulleted_list_item",',
        '      "bulleted_list_item": {',
        '        "rich_text": [',
        '          {',
        '            "type": "text",',
        '            "text": {',
        '              "content": "Backend API complete",',
        '              "link": null',
        '            },',
        '            "annotations": {',
        '              "bold": false,',
        '              "italic": false,',
        '              "strikethrough": false,',
        '              "underline": false,',
        '              "code": false,',
        '              "color": "default"',
        '            }',
        '          }',
        '        ],',
        '        "color": "default"',
        '      }',
        '    },',
        '    {',
        '      "type": "bulleted_list_item",',
        '      "bulleted_list_item": {',
        '        "rich_text": [',
        '          {',
        '            "type": "text",',
        '            "text": {',
        '              "content": "Frontend in review",',
        '              "link": null',
        '            },',
        '            "annotations": {',
        '              "bold": false,',
        '              "italic": false,',
        '              "strikethrough": false,',
        '              "underline": false,',
        '              "code": false,',
        '              "color": "default"',
        '            }',
        '          }',
        '        ],',
        '        "color": "default"',
        '      }',
        '    },',
        '    {',
        '      "type": "callout",',
        '      "callout": {',
        '        "rich_text": [',
        '          {',
        '            "type": "text",',
        '            "text": {',
        '              "content": "Ship date: Friday",',
        '              "link": null',
        '            },',
        '            "annotations": {',
        '              "bold": false,',
        '              "italic": false,',
        '              "strikethrough": false,',
        '              "underline": false,',
        '              "code": false,',
        '              "color": "default"',
        '            }',
        '          }',
        '        ],',
        '        "icon": {',
        '          "type": "emoji",',
        '          "emoji": "\uD83D\uDE80"',
        '        },',
        '        "color": "blue_background"',
        '      }',
        '    }',
        '  ]',
        '}'
      ].join("\n");

      // Repeat JSON to fill the viewport
      var fullBg = jsonBlock + "\n\n" + jsonBlock + "\n\n" + jsonBlock;

      var mdSource = [
        '## Status',
        '',
        'The project is **on track** for launch.',
        '',
        '- Backend API complete',
        '- Frontend in review',
        '- Tests passing',
        '',
        '> [!NOTE]',
        '> Ship date: Friday'
      ].join("\n");

      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("bg-json").innerHTML = highlightJSON(fullBg);
        document.getElementById("md-code").innerHTML =
          highlightMD(mdSource) + '<span class="cursor"></span>';
      });
    </script>
  </body>
</html>
