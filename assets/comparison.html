<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, initial-scale=1.0" />
    <title>Stop paying LLMs to write Notion JSON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800;9..40,900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --win-bg: #1e1e2e;
        --win-bar: #2a2a3e;
        --win-border: rgba(255, 255, 255, 0.08);
        --dot-red: #ff5f57;
        --dot-yellow: #febc2e;
        --dot-green: #28c840;
        --j-key: #89b4fa;
        --j-string: #f38ba8;
        --j-bool: #fab387;
        --j-punct: #45475a;
        --m-heading: #89dceb;
        --m-bold: #f9e2af;
        --m-bullet: #cba6f7;
        --m-callout: #a6e3a1;
        --m-text: #cdd6f4;
        --m-dim: #6c7086;
        --coral: #e8785a;
        --coral-deep: #d4604a;
        --mint: #4db8a4;
        --teal: #2d8a9c;
        --teal-dark: #1d6e7e;
        --page-bg: #f8f9fb;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html {
        display: flex;
        justify-content: center;
        min-height: 100vh;
        background: var(--page-bg);
      }

      body {
        width: 1080px;
        background: var(--page-bg);
        font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
        color: #1a2b3c;
        position: relative;
      }

      /* Warm gradient wash */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 800px 600px at 10% 15%, rgba(232, 120, 90, 0.12), transparent),
          radial-gradient(ellipse 600px 500px at 90% 20%, rgba(45, 138, 156, 0.10), transparent),
          radial-gradient(ellipse 900px 600px at 50% 75%, rgba(99, 102, 241, 0.07), transparent),
          radial-gradient(ellipse at 50% 50%, #f8f9fb, #f0f2f6);
        pointer-events: none;
        z-index: 0;
      }

      /* Subtle paper texture */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.018'/%3E%3C/svg%3E");
        background-size: 200px 200px;
        pointer-events: none;
        z-index: 100;
      }

      .container {
        position: relative;
        z-index: 1;
        padding: 52px 40px 56px;
      }

      /* ── Header ── */
      .header {
        text-align: center;
        margin-bottom: 36px;
      }

      .header h1 {
        font-size: 48px;
        font-weight: 900;
        letter-spacing: -0.04em;
        line-height: 1.1;
        color: #1a2b3c;
      }

      .header h1 .highlight {
        color: var(--coral);
      }

      .header .sub {
        margin-top: 10px;
        font-size: 16px;
        font-weight: 600;
        color: #7a8a98;
      }

      .header .sub em {
        font-style: normal;
        color: #4a5a68;
      }

      /* ── Side-by-side panels — asymmetric ── */
      .panels {
        display: flex;
        gap: 20px;
        align-items: flex-start;
      }

      /* ── macOS window base ── */
      .mac-window {
        border-radius: 12px;
        overflow: hidden;
        background: var(--win-bg);
        border: 1px solid rgba(0, 0, 0, 0.12);
        box-shadow:
          0 4px 6px rgba(0, 0, 0, 0.04),
          0 12px 28px rgba(0, 0, 0, 0.12),
          0 40px 80px rgba(0, 0, 0, 0.16);
      }

      .title-bar {
        display: flex;
        align-items: center;
        height: 40px;
        padding: 0 14px;
        background: var(--win-bar);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .dots {
        display: flex;
        gap: 7px;
        margin-right: 12px;
      }

      .dots span {
        width: 11px;
        height: 11px;
        border-radius: 50%;
      }

      .d-r { background: var(--dot-red); }
      .d-y { background: var(--dot-yellow); }
      .d-g { background: var(--dot-green); }

      .title-bar .filename {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 500;
        color: #585b70;
        flex: 1;
        text-align: center;
        margin-right: 48px;
      }

      /* Token count row */
      .token-row {
        padding: 10px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        background: rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      .token-row .number {
        font-family: "JetBrains Mono", monospace;
        font-size: 34px;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .token-row .label {
        font-size: 14px;
        font-weight: 700;
      }

      /* ── JSON window — wide, tall ── */
      .json-win {
        flex: 1.15;
      }

      .json-win .token-row .number { color: var(--coral); }
      .json-win .token-row .label { color: var(--coral-deep); opacity: 0.7; }

      .json-win pre {
        margin: 0;
        padding: 14px 16px 20px;
      }

      .json-win code {
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        line-height: 1.55;
        display: block;
        white-space: pre;
      }

      .json-win .ln {
        display: inline-block;
        width: 26px;
        text-align: right;
        margin-right: 14px;
        color: #313244;
        user-select: none;
        font-size: 10px;
      }

      .jk { color: var(--j-key); }
      .js { color: var(--j-string); }
      .jb { color: var(--j-bool); }
      .jp { color: var(--j-punct); }

      /* ── Markdown window — narrow, short ── */
      .md-win {
        flex: 0.85;
      }

      .md-win .token-row {
        background: rgba(77, 184, 164, 0.05);
      }

      .md-win .token-row .number { color: var(--mint); }
      .md-win .token-row .label { color: rgba(77, 184, 164, 0.5); }

      /* Green glow */
      .md-win {
        box-shadow:
          0 25px 80px rgba(0, 0, 0, 0.45),
          0 8px 24px rgba(0, 0, 0, 0.3),
          0 0 60px -15px rgba(77, 184, 164, 0.15);
      }

      .md-win::after {
        content: "";
        position: absolute;
        top: -1px;
        left: 15%;
        right: 15%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--mint), transparent);
        opacity: 0.5;
        z-index: 5;
      }

      .md-win {
        position: relative;
      }

      .md-win pre {
        margin: 0;
        padding: 18px 20px 22px;
      }

      .md-win code {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        line-height: 1.7;
        display: block;
        white-space: pre;
      }

      .md-win .ln {
        display: inline-block;
        width: 22px;
        text-align: right;
        margin-right: 16px;
        color: #1e3a2e;
        user-select: none;
        font-size: 11px;
      }

      .mh { color: var(--m-heading); font-weight: 700; }
      .mb { color: var(--m-bold); font-weight: 700; }
      .mbr { color: var(--m-dim); }
      .mbu { color: var(--m-bullet); font-weight: 600; }
      .mc { color: var(--m-callout); }
      .mt { color: var(--m-text); }
      .mq { color: var(--m-callout); opacity: 0.4; }

      .cursor {
        display: inline-block;
        width: 2px;
        height: 16px;
        background: var(--mint);
        margin-left: 2px;
        vertical-align: text-bottom;
        animation: blink 1s step-end infinite;
      }

      /* ── Stat + footer below the md window ── */
      .right-col {
        flex: 0.85;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .reduction {
        text-align: center;
        padding: 28px 20px;
        border-radius: 12px;
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }

      .reduction .big {
        font-family: "JetBrains Mono", monospace;
        font-size: 52px;
        font-weight: 800;
        letter-spacing: -0.05em;
        color: var(--teal-dark);
        line-height: 1;
      }

      .reduction .context {
        font-size: 15px;
        font-weight: 700;
        color: #8a96a2;
        margin-top: 6px;
      }

      .brand-card {
        text-align: center;
        padding: 20px;
        border-radius: 12px;
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }

      .brand-card .name {
        font-family: "JetBrains Mono", monospace;
        font-size: 17px;
        font-weight: 700;
        color: var(--teal-dark);
      }

      .brand-card .tagline {
        font-size: 13px;
        color: #8a96a2;
        margin-top: 3px;
        font-weight: 600;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Stop paying LLMs<br>to write <span class="highlight">Notion JSON.</span></h1>
        <p class="sub"><em>notion-mcp-server</em> requires 67 lines of block objects. Here's what that looks like.</p>
      </header>

      <section class="panels">
        <!-- LEFT: The long JSON wall -->
        <div class="mac-window json-win">
          <div class="title-bar">
            <div class="dots"><span class="d-r"></span><span class="d-y"></span><span class="d-g"></span></div>
            <span class="filename">notion-mcp-server</span>
          </div>
          <div class="token-row">
            <span class="number">~450</span>
            <span class="label">tokens</span>
          </div>
          <pre><code id="json-code"></code></pre>
        </div>

        <!-- RIGHT: Short markdown + stats underneath -->
        <div class="right-col">
          <div class="mac-window md-win">
            <div class="title-bar">
              <div class="dots"><span class="d-r"></span><span class="d-y"></span><span class="d-g"></span></div>
              <span class="filename">easy-notion-mcp</span>
            </div>
            <div class="token-row">
              <span class="number">~40</span>
              <span class="label">tokens</span>
            </div>
            <pre><code id="md-code"></code></pre>
          </div>

          <div class="reduction">
            <div class="big">91% less</div>
            <div class="context">same page, same blocks</div>
          </div>

          <div class="brand-card">
            <div class="name">easy-notion-mcp</div>
            <div class="tagline">Agents write markdown. Not JSON.</div>
          </div>
        </div>
      </section>
    </div>

    <script>
      function esc(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
      function w(cls, text) {
        return '<span class="' + cls + '">' + esc(text) + "</span>";
      }

      function highlightJSON(src) {
        var lines = src.split("\n"), out = [];
        for (var li = 0; li < lines.length; li++) {
          var ln = '<span class="ln">' + (li + 1) + "</span>";
          var text = lines[li], html = "", idx = 0;
          while (idx < text.length) {
            var ch = text[idx];
            if (ch === " " || ch === "\t") { html += ch; idx++; continue; }
            if (ch === '"') {
              var str = '"'; idx++;
              while (idx < text.length) {
                var c = text[idx]; str += c; idx++;
                if (c === "\\" && idx < text.length) { str += text[idx]; idx++; continue; }
                if (c === '"') break;
              }
              var peek = idx;
              while (peek < text.length && text[peek] === " ") peek++;
              html += w(text[peek] === ":" ? "jk" : "js", str);
              continue;
            }
            if ("{[}]:,".indexOf(ch) !== -1) { html += w("jp", ch); idx++; continue; }
            if (text.substr(idx, 4) === "true") { html += w("jb", "true"); idx += 4; continue; }
            if (text.substr(idx, 5) === "false") { html += w("jb", "false"); idx += 5; continue; }
            if (text.substr(idx, 4) === "null") { html += w("jp", "null"); idx += 4; continue; }
            if ((ch >= "0" && ch <= "9") || ch === "-") {
              var num = "";
              while (idx < text.length && /[0-9eE+.\-]/.test(text[idx])) { num += text[idx]; idx++; }
              html += w("jb", num); continue;
            }
            html += esc(ch); idx++;
          }
          out.push(ln + html);
        }
        return out.join("\n");
      }

      function highlightMD(src) {
        var lines = src.split("\n"), out = [];
        for (var i = 0; i < lines.length; i++) {
          var ln = '<span class="ln">' + (i + 1) + "</span>";
          var line = lines[i], h = "";
          if (/^##\s/.test(line)) h = w("mh", line);
          else if (/^>\s\[!/.test(line)) h = w("mq", "> ") + w("mc", line.slice(2));
          else if (/^>\s/.test(line)) h = w("mq", "> ") + w("mc", line.slice(2));
          else if (/^- /.test(line)) h = w("mbu", "- ") + w("mt", line.slice(2));
          else if (line === "") h = "";
          else {
            h = esc(line).replace(
              /\*\*(.+?)\*\*/g,
              '<span class="mbr">**</span><span class="mb">$1</span><span class="mbr">**</span>'
            );
            h = '<span class="mt">' + h + "</span>";
          }
          out.push(ln + h);
        }
        return out.join("\n");
      }

      // Full verbose JSON with all annotations expanded

        '          }',

        '    {',

        '        "rich_text": [{',

        '          }',
        '        }],',
        '        "color": "default"',
        '      }',
        '    },',
        '    {',
        '      "type": "bulleted_list_item",',
        '      "bulleted_list_item": {',
        '        "rich_text": [{',
        '          "type": "text",',
        '          "text": {',
        '            "content": "Frontend in review"',
        '          },',
        '          "annotations": {',
        '            "bold": false,',
        '            "italic": false,',
        '            "strikethrough": false,',
        '            "underline": false,',
        '            "code": false,',
        '            "color": "default"',
        '          }',
        '        }],',
        '        "color": "default"',
        '      }',
        '    },',
        '    {',
        '      "type": "bulleted_list_item",',
        '      "bulleted_list_item": {',
        '        "rich_text": [{',
        '          "type": "text",',
        '          "text": {',
        '            "content": "Tests passing"',
        '          },',
        '          "annotations": {',
        '            "bold": false,',
        '            "italic": false,',
        '            "strikethrough": false,',
        '            "underline": false,',
        '            "code": false,',
        '            "color": "default"',
        '          }',
        '        }],',
        '        "color": "default"',
        '      }',
        '    },',
        '    {',
        '      "type": "callout",',
        '      "callout": {',
        '        "rich_text": [{',
        '          "type": "text",',
        '          "text": {',
        '            "content": "Ship date: Friday"',
        '          },',
        '          "annotations": {',
        '            "bold": false,',
        '            "italic": false,',
        '            "strikethrough": false,',
        '            "underline": false,',
        '            "code": false,',
        '            "color": "default"',
        '          }',
        '        }],',
        '        "icon": {',
        '          "type": "emoji",',
        '          "emoji": "\uD83D\uDE80"',
        '        },',
        '        "color": "blue_background"',
        '      }',
        '    }',
        '  ]',
        '}'
      ].join("\n");

      var mdSource = [
        '## Status',
        '',
        'The project is **on track** for launch.',
        '',
        '- Backend API complete',
        '- Frontend in review',
        '- Tests passing',
        '',
        '> [!NOTE]',
        '> Ship date: Friday'
      ].join("\n");

      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("json-code").innerHTML = highlightJSON(jsonSource);
        document.getElementById("md-code").innerHTML =
          highlightMD(mdSource) + '<span class="cursor"></span>';
      });
    </script>
  </body>
</html>
